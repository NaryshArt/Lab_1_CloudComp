name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - master
      - main

jobs:

  # ─── 1. BUILD ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile application
        run: mvn clean compile -DskipTests --no-transfer-progress

  # ─── 2. LINT ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (Checkstyle)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        run: mvn checkstyle:check --no-transfer-progress

  # ─── 3. TEST + COVERAGE ───────────────────────────────────────────────────
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests with coverage
        run: mvn verify --no-transfer-progress

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 7

  # ─── 4. DOCKER BUILD ──────────────────────────────────────────────────────
  docker_build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: tags
        run: |
          BRANCH=$(echo "${{ github.head_ref }}" | tr '/' '-' | tr '_' '-' | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "sha=${SHORT_SHA}"  >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            -t todolist-app:${{ steps.tags.outputs.sha }} \
            -t todolist-app:${{ steps.tags.outputs.branch }} \
            .

  # ─── 5. DOCKER PUSH ───────────────────────────────────────────────────────
  docker_push:
    name: Docker Push
    runs-on: ubuntu-latest
    needs: docker_build
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: tags
        run: |
          BRANCH=$(echo "${{ github.head_ref }}" | tr '/' '-' | tr '_' '-' | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "sha=${SHORT_SHA}"  >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/todolist-app:${{ steps.tags.outputs.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/todolist-app:${{ steps.tags.outputs.branch }}